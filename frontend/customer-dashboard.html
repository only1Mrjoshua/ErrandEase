<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes"
    />
    <title>ErrandEase · Customer Dashboard</title>
    <!-- Tailwind + fonts -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="images/favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="images/favicon.svg" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="images/apple-touch-icon.png"
    />
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#10b981",
              secondary: "#1e293b",
              "background-light": "#f8fafc",
              "background-dark": "#0f172a",
            },
            fontFamily: {
              display: ["Inter", "sans-serif"],
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "1rem",
              full: "9999px",
            },
          },
        },
      };
    </script>
    <style>
      body {
        font-family: "Inter", sans-serif;
        background-color: #f8fafc;
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(10px);
      }
      .page-transition {
        transition: opacity 0.2s ease;
      }
      .hide-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      .hide-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .nav-active {
        color: #10b981;
        font-weight: 600;
      }
      .nav-active .material-symbols-outlined {
        font-variation-settings: "FILL" 1;
      }
      button,
      a {
        -webkit-tap-highlight-color: rgba(16, 185, 129, 0.2);
      }
      .card-hover {
        transition: all 0.15s ease;
      }
      .card-hover:active {
        transform: scale(0.99);
      }
      @media (min-width: 768px) {
        .card-hover:hover {
          transform: translateY(-2px);
          box-shadow: 0 12px 24px -8px rgba(0, 0, 0, 0.1);
        }
      }
      .modal-backdrop {
        background: rgba(0, 0, 0, 0.3);
        backdrop-filter: blur(4px);
      }

      @keyframes fade-in-down {
        from {
          opacity: 0;
          transform: translateY(-10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .animate-fade-in-down {
        animation: fade-in-down 0.3s ease-out;
      }
    </style>
  </head>
  <body class="bg-background-light text-slate-900 antialiased">
    <!-- MAIN LAYOUT -->
    <div class="flex min-h-screen">
      <!-- SIDEBAR (desktop) -->
      <aside
        id="desktopSidebar"
        class="fixed md:static inset-y-0 left-0 z-50 w-72 bg-white border-r border-slate-200 shadow-sm transform -translate-x-full md:translate-x-0 transition-transform duration-200 ease-in-out md:transition-none flex flex-col"
      >
        <div
          class="p-6 border-b border-slate-100 flex items-center justify-between"
        >
          <div class="flex items-center gap-2">
            <div class="bg-primary p-1.5 rounded-lg text-white">
              <span class="material-symbols-outlined text-2xl">local_mall</span>
            </div>
            <span class="text-xl font-[800] tracking-tight text-secondary"
              >ErrandEase</span
            >
          </div>
          <button
            id="closeSidebarBtn"
            class="md:hidden text-slate-500 hover:text-primary"
          >
            <span class="material-symbols-outlined">close</span>
          </button>
        </div>
        <nav class="flex-1 py-8 px-4 space-y-2">
          <a
            href="#"
            data-tab="request"
            class="sidebar-link flex items-center gap-4 px-4 py-3 rounded-xl text-slate-600 hover:bg-primary/5 hover:text-primary transition-colors font-medium"
          >
            <span class="material-symbols-outlined">add_circle</span>
            <span>Request Errand</span>
          </a>
          <a
            href="#"
            data-tab="ongoing"
            class="sidebar-link flex items-center gap-4 px-4 py-3 rounded-xl text-slate-600 hover:bg-primary/5 hover:text-primary transition-colors font-medium"
          >
            <span class="material-symbols-outlined">pending_actions</span>
            <span>Ongoing Errands</span>
          </a>
          <a
            href="#"
            data-tab="history"
            class="sidebar-link flex items-center gap-4 px-4 py-3 rounded-xl text-slate-600 hover:bg-primary/5 hover:text-primary transition-colors font-medium"
          >
            <span class="material-symbols-outlined">history</span>
            <span>Errand History</span>
          </a>
          <a
            href="#"
            data-tab="profile"
            class="sidebar-link flex items-center gap-4 px-4 py-3 rounded-xl text-slate-600 hover:bg-primary/5 hover:text-primary transition-colors font-medium"
          >
            <span class="material-symbols-outlined">person</span>
            <span>Profile</span>
          </a>
        </nav>
        <div class="p-4 border-t border-slate-100 text-xs text-slate-400">
          v2.0 · Customer
        </div>
      </aside>

      <!-- MAIN CONTENT -->
      <main class="flex-1 w-full md:w-auto">
        <!-- Top bar -->
        <div
          class="sticky top-0 z-40 bg-white/80 backdrop-blur-md border-b border-slate-200 px-4 h-16 flex items-center md:px-6"
        >
          <button id="hamburgerBtn" class="md:hidden text-slate-600 p-2 -ml-2">
            <span class="material-symbols-outlined text-2xl">menu</span>
          </button>
          <button id="desktopToggleBtn" class="hidden">
            <span class="material-symbols-outlined">menu_open</span>
          </button>
          <div
            class="flex-1 flex justify-end items-center gap-1 sm:gap-3 min-w-0"
          >
            <span
              class="text-xs sm:text-sm text-slate-500 block flex-1 text-right mr-1 whitespace-normal"
              id="greeting-container"
            ></span>
            <a href="#" id="profile-icon-link" class="block flex-shrink-0">
              <div
                class="w-8 h-8 sm:w-9 sm:h-9 rounded-full bg-primary/10 flex items-center justify-center text-primary cursor-pointer hover:bg-primary/20 transition-colors"
              >
                <span class="material-symbols-outlined text-xl sm:text-2xl"
                  >account_circle</span
                >
              </div>
            </a>
          </div>
        </div>

        <!-- Dynamic page container -->
        <div
          id="pageContainer"
          class="p-4 md:p-6 max-w-5xl mx-auto transition-opacity duration-200"
        ></div>
      </main>
    </div>

    <!-- Bottom navigation (mobile) -->
    <nav
      class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 flex justify-around items-center h-16 z-40 md:hidden"
    >
      <a
        href="#"
        data-tab="request"
        class="bottom-nav-item flex flex-col items-center justify-center text-slate-500 text-[11px] font-medium flex-1"
      >
        <span class="material-symbols-outlined text-xl">add_circle</span>
        <span>Request</span>
      </a>
      <a
        href="#"
        data-tab="ongoing"
        class="bottom-nav-item flex flex-col items-center justify-center text-slate-500 text-[11px] font-medium flex-1"
      >
        <span class="material-symbols-outlined text-xl">pending_actions</span>
        <span>Ongoing</span>
      </a>
      <a
        href="#"
        data-tab="history"
        class="bottom-nav-item flex flex-col items-center justify-center text-slate-500 text-[11px] font-medium flex-1"
      >
        <span class="material-symbols-outlined text-xl">history</span>
        <span>History</span>
      </a>
      <a
        href="#"
        data-tab="profile"
        class="bottom-nav-item flex flex-col items-center justify-center text-slate-500 text-[11px] font-medium flex-1"
      >
        <span class="material-symbols-outlined text-xl">person</span>
        <span>Profile</span>
      </a>
    </nav>

    <!-- Modal -->
    <div
      id="modalOverlay"
      class="fixed inset-0 z-[100] modal-backdrop hidden items-center justify-center p-4"
    >
      <div
        class="bg-white rounded-2xl max-w-md w-full max-h-[80vh] overflow-y-auto shadow-xl p-6"
      >
        <div class="flex justify-between items-center mb-4">
          <h3 class="text-xl font-bold text-secondary">Errand details</h3>
          <button id="closeModalBtn" class="text-slate-400 hover:text-primary">
            <span class="material-symbols-outlined">close</span>
          </button>
        </div>
        <div id="modalContent" class="space-y-3 text-slate-700"></div>
      </div>
    </div>

    <!-- Bottom padding for mobile -->
    <div class="h-16 md:h-0"></div>

    <!-- Scripts -->
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/customer-dashboard.js"></script>
  </body>
</html>
