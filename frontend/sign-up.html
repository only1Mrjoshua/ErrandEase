<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Sign Up | ErrandEase</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <!-- Primary favicon -->
    <link rel="icon" type="image/x-icon" href="/frontend/images/favicon.ico" />

    <!-- Modern SVG favicon -->
    <link rel="icon" type="image/svg+xml" href="/frontend/images/favicon.svg" />

    <!-- Apple Touch Icon (for iOS home screen) -->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/frontend/images/apple-touch-icon.png"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#10b981", // Emerald Green
              secondary: "#1e293b", // Navy Blue accent
              "background-light": "#f8fafc",
              "background-dark": "#0f172a",
            },
            fontFamily: {
              display: ["Inter", "sans-serif"],
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "1rem", // 16px
              full: "9999px",
            },
          },
        },
      };
    </script>
    <style type="text/tailwindcss">
      body {
        font-family: "Inter", sans-serif;
      }
      .auth-card {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
      }
      .role-radio:checked + label {
        /* Replace Tailwind @apply with explicit CSS to avoid "Unknown at rule @apply" */
        border-color: #10b981;
        background-color: #ecfdf5;
        color: #10b981;
      }
    </style>
  </head>
  <body
    class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 antialiased min-h-screen flex flex-col"
  >
    <header class="w-full bg-transparent">
      <nav
        class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between"
      >
        <a
          class="flex items-center gap-2 group cursor-pointer"
          href="index.html"
        >
          <div class="bg-primary p-1.5 rounded-lg text-white">
            <span class="material-symbols-outlined text-2xl">local_mall</span>
          </div>
          <span
            class="text-xl font-[800] tracking-tight text-secondary dark:text-white"
            >ErrandEase</span
          >
        </a>
      </nav>
    </header>
    <main class="flex-grow flex items-center justify-center px-6 py-12">
      <div class="w-full max-w-[480px]">
        <div
          class="auth-card bg-white dark:bg-slate-900 p-8 md:p-12 rounded-xl shadow-2xl shadow-slate-200 dark:shadow-none border border-slate-100 dark:border-slate-800"
        >
          <div class="text-center mb-10">
            <h1 class="text-3xl font-[800] text-secondary dark:text-white mb-3">
              Create your account
            </h1>
            <p class="text-slate-500 dark:text-slate-400">
              Join thousands of Nigerians getting things done.
            </p>
          </div>
          <form class="space-y-8">
            <div class="space-y-4">
              <button
                class="w-full bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-700 py-4 rounded-xl font-bold flex items-center justify-center gap-3 transition-all shadow-sm"
                type="button"
              >
                <svg class="w-5 h-5" viewBox="0 0 24 24">
                  <path
                    d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                    fill="#4285F4"
                  ></path>
                  <path
                    d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                    fill="#34A853"
                  ></path>
                  <path
                    d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                    fill="#FBBC05"
                  ></path>
                  <path
                    d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                    fill="#EA4335"
                  ></path>
                </svg>
                Sign up with Google
              </button>
              <p
                class="text-center text-[11px] text-slate-400 dark:text-slate-500 uppercase tracking-widest font-medium"
              >
                We use Google for a faster, more secure experience.
              </p>
            </div>
          </form>
          <div
            class="mt-10 pt-8 border-t border-slate-100 dark:border-slate-800 text-center"
          >
            <p class="text-sm text-slate-600 dark:text-slate-400">
              Already have an account?
              <a
                class="text-primary font-bold hover:underline ml-1"
                href="Sign in.html"
                >Sign In</a
              >
            </p>
          </div>
        </div>
        <div
          class="mt-8 flex justify-center gap-6 text-[12px] text-slate-400 font-medium"
        >
          <a class="hover:text-primary transition-colors" href="#"
            >Terms of Service</a
          >
          <a class="hover:text-primary transition-colors" href="#"
            >Privacy Policy</a
          >
          <a class="hover:text-primary transition-colors" href="#"
            >Help Center</a
          >
        </div>
      </div>
    </main>
    <footer class="py-8 text-center">
      <p class="text-xs text-slate-400">
        © 2026 ErrandEase Marketplace. Secure payments by Paystack.
      </p>
    </footer>
  </body>
</html>
