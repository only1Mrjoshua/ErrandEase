<!-- admin-dashboard.html - Updated with unified UI feedback system -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes"
    />
    <title>ErrandEase · Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/x-icon" href="images/favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="images/favicon.svg" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="images/apple-touch-icon.png"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
        background-color: #f8fafc;
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(10px);
      }
      .page-transition {
        transition: opacity 0.2s ease;
      }
      .hide-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      .hide-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .nav-active {
        color: #10b981;
        font-weight: 600;
      }
      .nav-active .material-symbols-outlined {
        font-variation-settings: "FILL" 1;
      }
      button,
      a {
        -webkit-tap-highlight-color: rgba(16, 185, 129, 0.2);
      }
      .card-hover {
        transition: all 0.15s ease;
      }
      .card-hover:active {
        transform: scale(0.99);
      }
      @media (min-width: 768px) {
        .card-hover:hover {
          transform: translateY(-2px);
          box-shadow: 0 12px 24px -8px rgba(0, 0, 0, 0.1);
        }
      }
      .modal-backdrop {
        background: rgba(0, 0, 0, 0.3);
        backdrop-filter: blur(4px);
      }
      .stat-card {
        transition: all 0.2s ease;
      }
      .stat-card:hover {
        transform: translateY(-2px);
      }
      .data-table {
        border-collapse: separate;
        border-spacing: 0 8px;
      }
      .data-table tr {
        transition: all 0.2s ease;
      }
      .data-table tr:hover {
        background-color: #f1f5f9;
      }
      .pulse-animation {
        animation: pulse 2s infinite;
      }
      @keyframes pulse {
        0% {
          box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4);
        }
        70% {
          box-shadow: 0 0 0 10px rgba(16, 185, 129, 0);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(16, 185, 129, 0);
        }
      }

      /* Toast animations */
      @keyframes slideIn {
        from {
          transform: translateX(100%);
          opacity: 0;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }

      @keyframes slideOut {
        from {
          transform: translateX(0);
          opacity: 1;
        }
        to {
          transform: translateX(100%);
          opacity: 0;
        }
      }

      .toast-enter {
        animation: slideIn 0.3s ease-out forwards;
      }

      .toast-exit {
        animation: slideOut 0.3s ease-out forwards;
      }
    </style>
  </head>
  <body class="bg-background-light text-slate-900 antialiased">
    <!-- Loading Overlay -->
    <div
      id="loadingOverlay"
      class="fixed inset-0 z-[9999] bg-white/80 backdrop-blur-sm hidden items-center justify-center"
    >
      <div class="text-center">
        <div
          class="inline-block animate-spin rounded-full h-12 w-12 border-4 border-primary border-t-transparent"
        ></div>
        <p class="mt-4 text-slate-600 font-medium" id="loadingMessage">
          Loading...
        </p>
      </div>
    </div>

    <!-- Toast Container -->
    <div
      id="toastContainer"
      class="fixed top-4 right-4 z-[9999] flex flex-col gap-2 w-full max-w-sm pointer-events-none"
    ></div>

    <!-- Modal Container -->
    <div
      id="modalContainer"
      class="fixed inset-0 z-[9998] pointer-events-none"
    ></div>

    <!-- Main Layout -->
    <div class="flex min-h-screen">
      <!-- Sidebar -->
      <aside
        id="desktopSidebar"
        class="fixed md:static inset-y-0 left-0 z-50 w-72 bg-white border-r border-slate-200 shadow-sm transform -translate-x-full md:translate-x-0 transition-transform duration-200 ease-in-out md:transition-none flex flex-col"
      >
        <div
          class="p-6 border-b border-slate-100 flex items-center justify-between"
        >
          <div class="flex items-center gap-2">
            <div class="bg-slate-800 p-1.5 rounded-lg text-white">
              <span class="material-symbols-outlined text-2xl"
                >admin_panel_settings</span
              >
            </div>
            <span class="text-xl font-[800] tracking-tight text-secondary"
              >Admin Panel</span
            >
          </div>
          <button
            id="closeSidebarBtn"
            class="md:hidden text-slate-500 hover:text-primary"
          >
            <span class="material-symbols-outlined">close</span>
          </button>
        </div>

        <!-- Admin Info -->
        <div class="p-4 border-b border-slate-100 bg-slate-50">
          <div class="flex items-center gap-3">
            <div
              class="w-10 h-10 rounded-full bg-slate-700 flex items-center justify-center text-white"
            >
              <span class="material-symbols-outlined"
                >admin_panel_settings</span
              >
            </div>
            <div class="flex-1 min-w-0">
              <p
                id="adminName"
                class="text-sm font-semibold text-slate-800 truncate"
              >
                Loading...
              </p>
              <p id="adminEmail" class="text-xs text-slate-500 truncate">
                Loading...
              </p>
            </div>
          </div>
        </div>

        <!-- Navigation -->
        <nav class="flex-1 py-8 px-4 space-y-2">
          <a
            href="#"
            data-tab="overview"
            class="sidebar-link flex items-center gap-4 px-4 py-3 rounded-xl text-slate-600 hover:bg-primary/5 hover:text-primary transition-colors font-medium"
          >
            <span class="material-symbols-outlined">dashboard</span>
            <span>Overview</span>
          </a>
          <a
            href="#"
            data-tab="customers"
            class="sidebar-link flex items-center gap-4 px-4 py-3 rounded-xl text-slate-600 hover:bg-primary/5 hover:text-primary transition-colors font-medium"
          >
            <span class="material-symbols-outlined">people</span>
            <span>Customers</span>
            <span
              id="customersCount"
              class="ml-auto bg-slate-100 text-slate-600 text-xs px-2 py-1 rounded-full"
              >0</span
            >
          </a>
          <a
            href="#"
            data-tab="agents"
            class="sidebar-link flex items-center gap-4 px-4 py-3 rounded-xl text-slate-600 hover:bg-primary/5 hover:text-primary transition-colors font-medium"
          >
            <span class="material-symbols-outlined">support_agent</span>
            <span>Agents</span>
            <span
              id="agentsCount"
              class="ml-auto bg-slate-100 text-slate-600 text-xs px-2 py-1 rounded-full"
              >0</span
            >
          </a>
          <a
            href="#"
            data-tab="errands"
            class="sidebar-link flex items-center gap-4 px-4 py-3 rounded-xl text-slate-600 hover:bg-primary/5 hover:text-primary transition-colors font-medium"
          >
            <span class="material-symbols-outlined">local_mall</span>
            <span>Errands</span>
            <span
              id="errandsCount"
              class="ml-auto bg-slate-100 text-slate-600 text-xs px-2 py-1 rounded-full"
              >0</span
            >
          </a>
          <a
            href="#"
            data-tab="profile"
            class="sidebar-link flex items-center gap-4 px-4 py-3 rounded-xl text-slate-600 hover:bg-primary/5 hover:text-primary transition-colors font-medium"
          >
            <span class="material-symbols-outlined">admin_panel_settings</span>
            <span>Profile</span>
          </a>
        </nav>

        <!-- Logout Button -->
        <div class="p-4 border-t border-slate-100">
          <button
            id="logoutBtn"
            class="w-full flex items-center justify-center gap-2 py-3 rounded-xl border border-red-200 text-red-600 font-bold hover:bg-red-50 transition-colors"
          >
            <span class="material-symbols-outlined">logout</span>
            <span>Log out</span>
          </button>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="flex-1 w-full md:w-auto">
        <!-- Top Bar -->
        <div
          class="sticky top-0 z-40 bg-white/80 backdrop-blur-md border-b border-slate-200 px-4 h-16 flex items-center md:px-6"
        >
          <button id="hamburgerBtn" class="md:hidden text-slate-600 p-2 -ml-2">
            <span class="material-symbols-outlined text-2xl">menu</span>
          </button>
          <div class="flex-1 flex justify-end items-center gap-3">
            <span
              class="text-sm text-slate-500 hidden sm:block"
              id="greeting"
            ></span>
            <div
              class="w-9 h-9 rounded-full bg-slate-700 flex items-center justify-center text-white"
            >
              <span class="material-symbols-outlined text-sm"
                >admin_panel_settings</span
              >
            </div>
          </div>
        </div>

        <!-- Dynamic Page Container -->
        <div
          id="pageContainer"
          class="p-4 md:p-6 max-w-7xl mx-auto transition-opacity duration-200"
        ></div>
      </main>
    </div>

    <!-- Mobile Bottom Navigation -->
    <nav
      class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 flex justify-around items-center h-16 z-40 md:hidden"
    >
      <a
        href="#"
        data-tab="overview"
        class="bottom-nav-item flex flex-col items-center justify-center text-slate-500 text-[11px] font-medium flex-1"
      >
        <span class="material-symbols-outlined text-xl">dashboard</span>
        <span>Overview</span>
      </a>
      <a
        href="#"
        data-tab="customers"
        class="bottom-nav-item flex flex-col items-center justify-center text-slate-500 text-[11px] font-medium flex-1"
      >
        <span class="material-symbols-outlined text-xl">people</span>
        <span>Customers</span>
      </a>
      <a
        href="#"
        data-tab="agents"
        class="bottom-nav-item flex flex-col items-center justify-center text-slate-500 text-[11px] font-medium flex-1"
      >
        <span class="material-symbols-outlined text-xl">support_agent</span>
        <span>Agents</span>
      </a>
      <a
        href="#"
        data-tab="errands"
        class="bottom-nav-item flex flex-col items-center justify-center text-slate-500 text-[11px] font-medium flex-1"
      >
        <span class="material-symbols-outlined text-xl">local_mall</span>
        <span>Errands</span>
      </a>
    </nav>

    <!-- Bottom Padding -->
    <div class="h-16 md:h-0"></div>

    <!-- Scripts -->
    <script src="js/config.js"></script>
    <script src="js/ui-feedback.js"></script>
    <script src="js/admin-dashboard.js"></script>
  </body>
</html>
