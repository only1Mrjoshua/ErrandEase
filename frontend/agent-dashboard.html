<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes"
    />
    <title>ErrandEase · Agent Dashboard</title>
    <!-- Tailwind + fonts -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <!-- Primary favicon -->
    <link rel="icon" type="image/x-icon" href="/frontend/images/favicon.ico" />

    <!-- Modern SVG favicon -->
    <link rel="icon" type="image/svg+xml" href="/frontend/images/favicon.svg" />

    <!-- Apple Touch Icon (for iOS home screen) -->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/frontend/images/apple-touch-icon.png"
    />
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#10b981",
              secondary: "#1e293b",
              "background-light": "#f8fafc",
              "background-dark": "#0f172a",
            },
            fontFamily: {
              display: ["Inter", "sans-serif"],
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "1rem",
              full: "9999px",
            },
          },
        },
      };
    </script>
    <style>
      body {
        font-family: "Inter", sans-serif;
        background-color: #f8fafc;
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(10px);
      }
      .page-transition {
        transition: opacity 0.2s ease;
      }
      .hide-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      .hide-scrollbar::-webkit-scrollbar {
        display: none;
      }
      /* active nav indicator */
      .nav-active {
        color: #10b981;
        font-weight: 600;
      }
      .nav-active .material-symbols-outlined {
        font-variation-settings: "FILL" 1;
      }
      button,
      a {
        -webkit-tap-highlight-color: rgba(16, 185, 129, 0.2);
      }
      .card-hover {
        transition: all 0.15s ease;
      }
      .card-hover:active {
        transform: scale(0.99);
      }
      @media (min-width: 768px) {
        .card-hover:hover {
          transform: translateY(-2px);
          box-shadow: 0 12px 24px -8px rgba(0, 0, 0, 0.1);
        }
      }
      .modal-backdrop {
        background: rgba(0, 0, 0, 0.3);
        backdrop-filter: blur(4px);
      }
      /* micro chart bar simulation */
      .stat-bar {
        height: 8px;
        background: #e2e8f0;
        border-radius: 999px;
        overflow: hidden;
      }
      .stat-bar-fill {
        height: 100%;
        background: #10b981;
        border-radius: 999px;
        width: 0%;
      }
      .pulse-animation {
        animation: pulse 2s infinite;
      }
      @keyframes pulse {
        0% {
          box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4);
        }
        70% {
          box-shadow: 0 0 0 10px rgba(16, 185, 129, 0);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(16, 185, 129, 0);
        }
      }
    </style>
  </head>
  <body class="bg-background-light text-slate-900 antialiased">
    <!-- ========== MAIN LAYOUT: flex (sidebar + content) ========== -->
    <div class="flex min-h-screen">
      <!-- SIDEBAR (desktop) – hidden on mobile by default -->
      <aside
        id="desktopSidebar"
        class="fixed md:static inset-y-0 left-0 z-50 w-72 bg-white border-r border-slate-200 shadow-sm transform -translate-x-full md:translate-x-0 transition-transform duration-200 ease-in-out md:transition-none flex flex-col"
      >
        <div
          class="p-6 border-b border-slate-100 flex items-center justify-between"
        >
          <div class="flex items-center gap-2">
            <div class="bg-primary p-1.5 rounded-lg text-white">
              <span class="material-symbols-outlined text-2xl">local_mall</span>
            </div>
            <span class="text-xl font-[800] tracking-tight text-secondary"
              >ErrandEase</span
            >
          </div>
          <button
            id="closeSidebarBtn"
            class="md:hidden text-slate-500 hover:text-primary"
          >
            <span class="material-symbols-outlined">close</span>
          </button>
        </div>
        <!-- sidebar nav items (agent sections) -->
        <nav class="flex-1 py-8 px-4 space-y-2">
          <a
            href="#"
            data-tab="available"
            class="sidebar-link flex items-center gap-4 px-4 py-3 rounded-xl text-slate-600 hover:bg-primary/5 hover:text-primary transition-colors font-medium"
          >
            <span class="material-symbols-outlined">explore</span>
            <span>Available Requests</span>
            <span
              id="availableCount"
              class="ml-auto bg-primary/10 text-primary text-xs px-2 py-1 rounded-full"
              >0</span
            >
          </a>
          <a
            href="#"
            data-tab="assigned"
            class="sidebar-link flex items-center gap-4 px-4 py-3 rounded-xl text-slate-600 hover:bg-primary/5 hover:text-primary transition-colors font-medium"
          >
            <span class="material-symbols-outlined">assignment</span>
            <span>Assigned Errands</span>
            <span
              id="assignedCount"
              class="ml-auto bg-amber-100 text-amber-700 text-xs px-2 py-1 rounded-full"
              >0</span
            >
          </a>
          <a
            href="#"
            data-tab="completed"
            class="sidebar-link flex items-center gap-4 px-4 py-3 rounded-xl text-slate-600 hover:bg-primary/5 hover:text-primary transition-colors font-medium"
          >
            <span class="material-symbols-outlined">check_circle</span>
            <span>Completed</span>
          </a>
          <a
            href="#"
            data-tab="earnings"
            class="sidebar-link flex items-center gap-4 px-4 py-3 rounded-xl text-slate-600 hover:bg-primary/5 hover:text-primary transition-colors font-medium"
          >
            <span class="material-symbols-outlined">bar_chart</span>
            <span>Earnings / Stats</span>
          </a>
          <a
            href="#"
            data-tab="profile"
            class="sidebar-link flex items-center gap-4 px-4 py-3 rounded-xl text-slate-600 hover:bg-primary/5 hover:text-primary transition-colors font-medium"
          >
            <span class="material-symbols-outlined">person</span>
            <span>Profile</span>
          </a>
        </nav>
        <div class="p-4 border-t border-slate-100 text-xs text-slate-400">
          Agent · Chidi
        </div>
      </aside>

      <!-- MAIN CONTENT -->
      <main class="flex-1 w-full md:w-auto">
        <!-- Top bar with hamburger -->
        <div
          class="sticky top-0 z-40 bg-white/80 backdrop-blur-md border-b border-slate-200 px-4 h-16 flex items-center md:px-6"
        >
          <!-- Mobile hamburger - hidden on desktop -->
          <button id="hamburgerBtn" class="md:hidden text-slate-600 p-2 -ml-2">
            <span class="material-symbols-outlined text-2xl">menu</span>
          </button>

          <!-- Desktop toggle button - completely hidden -->
          <button id="desktopToggleBtn" class="hidden">
            <span class="material-symbols-outlined">menu_open</span>
          </button>

          <div class="flex-1 flex justify-end items-center gap-3">
            <span class="text-sm text-slate-500 hidden sm:block"
              >👋 Good day, Chidi</span
            >
            <div
              class="w-9 h-9 rounded-full bg-primary/10 flex items-center justify-center text-primary"
            >
              <span class="material-symbols-outlined">support_agent</span>
            </div>
          </div>
        </div>

        <!-- DYNAMIC PAGE CONTAINER (tabs) -->
        <div
          id="pageContainer"
          class="p-4 md:p-6 max-w-5xl mx-auto transition-opacity duration-200"
        ></div>
      </main>
    </div>

    <!-- BOTTOM NAVIGATION (mobile) -->
    <nav
      class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 flex justify-around items-center h-16 z-40 md:hidden"
    >
      <a
        href="#"
        data-tab="available"
        class="bottom-nav-item flex flex-col items-center justify-center text-slate-500 text-[11px] font-medium flex-1"
      >
        <span class="material-symbols-outlined text-xl">explore</span>
        <span>Available</span>
      </a>
      <a
        href="#"
        data-tab="assigned"
        class="bottom-nav-item flex flex-col items-center justify-center text-slate-500 text-[11px] font-medium flex-1"
      >
        <span class="material-symbols-outlined text-xl">assignment</span>
        <span>Assigned</span>
      </a>
      <a
        href="#"
        data-tab="completed"
        class="bottom-nav-item flex flex-col items-center justify-center text-slate-500 text-[11px] font-medium flex-1"
      >
        <span class="material-symbols-outlined text-xl">check_circle</span>
        <span>Completed</span>
      </a>
      <a
        href="#"
        data-tab="earnings"
        class="bottom-nav-item flex flex-col items-center justify-center text-slate-500 text-[11px] font-medium flex-1"
      >
        <span class="material-symbols-outlined text-xl">bar_chart</span>
        <span>Earnings</span>
      </a>
    </nav>

    <!-- MODAL / SLIDE-UP PANEL (for available errand details + accept action) -->
    <div
      id="actionModal"
      class="fixed inset-0 z-[100] modal-backdrop hidden items-end md:items-center justify-center p-4"
      onclick="if (event.target === this) closeActionModal();"
    >
      <div
        class="bg-white rounded-t-2xl md:rounded-2xl w-full max-w-md max-h-[80vh] overflow-y-auto shadow-xl p-6"
        onclick="event.stopPropagation()"
      >
        <div class="flex justify-between items-center mb-4">
          <h3 class="text-xl font-bold text-secondary">Errand details</h3>
          <button
            onclick="closeActionModal()"
            class="text-slate-400 hover:text-primary"
          >
            <span class="material-symbols-outlined">close</span>
          </button>
        </div>
        <div id="actionModalContent" class="space-y-4 text-slate-700"></div>
      </div>
    </div>

    <script>
      (function () {
        // ---------- MOCK DATA / LOCAL STATE (agent) ----------

        // Current agent ID (in a real app, this would come from authentication)
        const CURRENT_AGENT_ID = "agent_chidi";
        const CURRENT_AGENT_NAME = "Chidi Okonkwo";

        // Available errands (shared pool - all agents see these)
        let availableErrands = [
          {
            id: "av1",
            title: "Grocery shopping (Mile 12)",
            customer: "Tunde B.",
            customerPhone: "+234 812 345 6789",
            pickup: "Mile 12 market",
            delivery: "Ikeja",
            time: "10:30 AM",
            cost: 4200,
            description: "5kg rice, 2 liters oil, fresh tomatoes, onions",
            createdAt: "2026-03-01T08:30:00",
            distance: "5.2 km",
          },
          {
            id: "av2",
            title: "Document delivery (Urgent)",
            customer: "Femi A.",
            customerPhone: "+234 803 123 4567",
            pickup: "Marina",
            delivery: "Victoria Island",
            time: "2:00 PM",
            cost: 3500,
            description:
              "Legal documents - envelope to client (signature required)",
            createdAt: "2026-03-01T09:15:00",
            distance: "8.1 km",
          },
          {
            id: "av3",
            title: "Pharmacy pickup",
            customer: "Mrs. Obi",
            customerPhone: "+234 805 678 9012",
            pickup: "Lekki Pharmacy",
            delivery: "Lekki Phase 1",
            time: "4:15 PM",
            cost: 2800,
            description: "Prescription meds - need to show ID at pickup",
            createdAt: "2026-03-01T07:45:00",
            distance: "3.4 km",
          },
          {
            id: "av4",
            title: "Package delivery to airport",
            customer: "Adebayo O.",
            customerPhone: "+234 809 876 5432",
            pickup: "Ikeja",
            delivery: "MMA Airport",
            time: "5:30 PM",
            cost: 5000,
            description:
              "Small package for courier - urgent, must arrive before 6pm",
            createdAt: "2026-03-01T10:00:00",
            distance: "12.5 km",
          },
        ];

        // Assigned errands (only this agent's accepted errands)
        let assignedErrands = [
          {
            id: "a1",
            title: "Grocery pickup (Mile 12)",
            customer: "Tunde B.",
            pickup: "Mile 12 market",
            delivery: "Ikeja",
            time: "10:30 AM",
            status: "pending",
            cost: 4200,
            description: "5kg rice, oil, tomatoes",
          },
        ];

        // Completed errands (this agent's completed errands)
        let completedErrands = [
          {
            id: "c1",
            title: "Bank deposit",
            customer: "Ngozi E.",
            dateCompleted: "2026-02-26",
            earned: 3200,
          },
          {
            id: "c2",
            title: "Package delivery",
            customer: "Jide K.",
            dateCompleted: "2026-02-25",
            earned: 2900,
          },
        ];

        // earnings summary (will be recomputed)
        function computeEarnings() {
          const totalEarned = completedErrands.reduce(
            (sum, e) => sum + e.earned,
            0,
          );
          const pending = assignedErrands
            .filter((e) => e.status !== "completed")
            .reduce((sum, e) => sum + e.cost, 0);
          const completedCount = completedErrands.length;
          return { totalEarned, pending, completedCount };
        }

        // Update counts in sidebar
        function updateSidebarCounts() {
          const availableCountEl = document.getElementById("availableCount");
          const assignedCountEl = document.getElementById("assignedCount");

          if (availableCountEl) {
            availableCountEl.textContent = availableErrands.length;
          }
          if (assignedCountEl) {
            assignedCountEl.textContent = assignedErrands.length;
          }
        }

        // ---------- DOM ELEMENTS ----------
        const pageContainer = document.getElementById("pageContainer");
        const sidebar = document.getElementById("desktopSidebar");
        const hamburgerBtn = document.getElementById("hamburgerBtn");
        const closeSidebarBtn = document.getElementById("closeSidebarBtn");
        const desktopToggleBtn = document.getElementById("desktopToggleBtn");
        const bottomNavItems = document.querySelectorAll(".bottom-nav-item");
        const sidebarLinks = document.querySelectorAll(".sidebar-link");
        const actionModal = document.getElementById("actionModal");
        const modalContent = document.getElementById("actionModalContent");

        let currentTab = "available"; // Start with available tab
        let sidebarVisible = true;

        // ---------- SIDEBAR TOGGLE ----------
        function closeSidebar() {
          sidebar.classList.add("-translate-x-full");
        }
        function openSidebar() {
          sidebar.classList.remove("-translate-x-full");
        }
        hamburgerBtn.addEventListener("click", openSidebar);
        closeSidebarBtn.addEventListener("click", closeSidebar);
        desktopToggleBtn.addEventListener("click", () => {
          if (sidebarVisible) {
            sidebar.classList.add("-translate-x-full");
            desktopToggleBtn.innerHTML =
              '<span class="material-symbols-outlined">menu</span>';
          } else {
            sidebar.classList.remove("-translate-x-full");
            desktopToggleBtn.innerHTML =
              '<span class="material-symbols-outlined">menu_open</span>';
          }
          sidebarVisible = !sidebarVisible;
        });

        // ---------- NAVIGATION HANDLER ----------
        function handleNavClick(e, tabId) {
          e.preventDefault();
          if (window.innerWidth < 768) closeSidebar();
          setActiveTab(tabId);
        }

        function setActiveTab(tabId) {
          currentTab = tabId;
          // bottom nav
          bottomNavItems.forEach((item) => {
            const tab = item.getAttribute("data-tab");
            if (tab === tabId) {
              item.classList.add("nav-active", "text-primary");
              item
                .querySelector(".material-symbols-outlined")
                ?.classList.add("fill-1");
            } else {
              item.classList.remove("nav-active", "text-primary");
              item
                .querySelector(".material-symbols-outlined")
                ?.classList.remove("fill-1");
            }
          });
          // sidebar links
          sidebarLinks.forEach((link) => {
            const tab = link.getAttribute("data-tab");
            if (tab === tabId) {
              link.classList.add(
                "bg-primary/5",
                "text-primary",
                "font-semibold",
              );
              link.classList.remove("text-slate-600");
            } else {
              link.classList.remove(
                "bg-primary/5",
                "text-primary",
                "font-semibold",
              );
              link.classList.add("text-slate-600");
            }
          });
          renderPage(tabId);
        }

        // ---------- RENDER PAGE DISPATCH ----------
        function renderPage(tab) {
          if (tab === "available") pageContainer.innerHTML = renderAvailable();
          else if (tab === "assigned")
            pageContainer.innerHTML = renderAssigned();
          else if (tab === "completed")
            pageContainer.innerHTML = renderCompleted();
          else if (tab === "earnings")
            pageContainer.innerHTML = renderEarnings();
          else if (tab === "profile") pageContainer.innerHTML = renderProfile();

          if (tab === "available") attachAvailableEvents();
          else if (tab === "assigned") attachAssignedEvents();

          updateSidebarCounts();
        }

        // ---------- PAGE 1: AVAILABLE ERRANDS (Shared pool) ----------
        function renderAvailable() {
          if (availableErrands.length === 0) {
            return `<div class="h-[70vh] flex flex-col items-center justify-center text-center">
              <span class="material-symbols-outlined text-6xl text-slate-300">explore</span>
              <p class="text-slate-400 text-lg font-medium mt-4">No available errands</p>
              <p class="text-sm text-slate-400">Check back later for new requests.</p>
            </div>`;
          }

          let cards = "";
          availableErrands.forEach((e) => {
            // Format time ago
            const created = new Date(e.createdAt);
            const now = new Date();
            const diffMs = now - created;
            const diffMins = Math.floor(diffMs / 60000);
            const timeAgo =
              diffMins < 60
                ? `${diffMins} min${diffMins !== 1 ? "s" : ""} ago`
                : `${Math.floor(diffMins / 60)} hour${Math.floor(diffMins / 60) !== 1 ? "s" : ""} ago`;

            cards += `
              <div class="bg-white rounded-xl p-5 border border-slate-100 shadow-sm card-hover relative" data-id="${e.id}">
                ${diffMins < 30 ? '<div class="absolute top-2 right-2"><span class="bg-green-100 text-green-700 text-xs px-2 py-1 rounded-full flex items-center"><span class="w-2 h-2 bg-green-500 rounded-full mr-1 pulse-animation"></span> New</span></div>' : ""}
                <div class="flex justify-between items-start">
                  <h3 class="font-bold text-lg">${e.title}</h3>
                  <span class="text-xs bg-primary/10 text-primary px-3 py-1 rounded-full font-semibold">₦${e.cost.toLocaleString()}</span>
                </div>
                <p class="text-sm text-slate-500 mt-1">
                  👤 ${e.customer} · ⏱️ ${e.time} · 🚗 ${e.distance}
                </p>
                <div class="flex text-sm text-slate-600 mt-2">
                  <span class="material-symbols-outlined text-base mr-1">place</span>
                  ${e.pickup} → ${e.delivery}
                </div>
                <p class="text-xs text-slate-400 mt-2">📅 Posted ${timeAgo}</p>
                <button class="accept-errand-btn mt-4 w-full bg-primary hover:bg-emerald-600 text-white py-3 rounded-xl font-medium transition-colors" data-id="${e.id}">
                  Accept Errand
                </button>
              </div>
            `;
          });

          return `
            <div class="space-y-4">
              <div class="flex justify-between items-center">
                <h2 class="text-xl font-bold text-secondary">Available Errands (${availableErrands.length})</h2>
                <span class="text-xs text-slate-500 bg-white px-3 py-1 rounded-full shadow-sm">Auto-refreshes every 30s</span>
              </div>
              <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                ${cards}
              </div>
            </div>
          `;
        }

        function attachAvailableEvents() {
          document.querySelectorAll(".accept-errand-btn").forEach((btn) => {
            btn.addEventListener("click", (e) => {
              const id = btn.getAttribute("data-id");
              const errand = availableErrands.find((e) => e.id === id);
              if (!errand) return;

              // Show confirmation modal with details
              modalContent.innerHTML = `
                <div>
                  <p class="font-semibold text-lg">${errand.title}</p>
                  <div class="bg-slate-50 p-4 rounded-xl space-y-2 mt-2">
                    <p><span class="font-medium">Customer:</span> ${errand.customer}</p>
                    <p><span class="font-medium">Phone:</span> ${errand.customerPhone}</p>
                    <p><span class="font-medium">Pickup:</span> ${errand.pickup}</p>
                    <p><span class="font-medium">Delivery:</span> ${errand.delivery}</p>
                    <p><span class="font-medium">Time:</span> ${errand.time}</p>
                    <p><span class="font-medium">Distance:</span> ${errand.distance}</p>
                    <p><span class="font-medium">Description:</span> ${errand.description}</p>
                    <p><span class="font-medium">Earnings:</span> <span class="text-primary font-bold">₦${errand.cost.toLocaleString()}</span></p>
                  </div>
                  <p class="text-amber-600 text-sm mt-3 flex items-center gap-1">
                    <span class="material-symbols-outlined text-sm">warning</span>
                    By accepting, this errand will be removed from the available pool for other agents.
                  </p>
                  <div class="flex gap-2 mt-4">
                    <button id="confirmAcceptBtn" class="flex-1 bg-primary hover:bg-emerald-600 text-white py-3 rounded-xl font-bold">✅ Confirm Accept</button>
                    <button onclick="closeActionModal()" class="flex-1 border border-slate-200 hover:bg-slate-50 py-3 rounded-xl font-medium">Cancel</button>
                  </div>
                </div>
              `;

              actionModal.classList.remove("hidden");
              actionModal.classList.add("flex");

              // Handle accept confirmation
              document
                .getElementById("confirmAcceptBtn")
                ?.addEventListener("click", () => {
                  // Remove from available and add to assigned
                  const index = availableErrands.findIndex((x) => x.id === id);
                  if (index !== -1) {
                    const acceptedErrand = {
                      ...availableErrands[index],
                      status: "pending",
                      acceptedBy: CURRENT_AGENT_ID,
                      acceptedAt: new Date().toISOString(),
                    };

                    // Remove from available
                    availableErrands.splice(index, 1);

                    // Add to assigned
                    assignedErrands.push(acceptedErrand);

                    // Close modal
                    closeActionModal();

                    // Show success message and update UI
                    alert(
                      `✅ You've successfully accepted "${acceptedErrand.title}"! It has been moved to your assigned errands.`,
                    );

                    // Update counts and refresh current tab
                    updateSidebarCounts();
                    setActiveTab(currentTab); // Refresh current view
                  }
                });
            });
          });
        }

        // ---------- PAGE 2: ASSIGNED ERRANDS ----------
        function renderAssigned() {
          if (assignedErrands.length === 0) {
            return `<div class="h-[70vh] flex flex-col items-center justify-center text-center">
              <span class="material-symbols-outlined text-6xl text-slate-300">assignment</span>
              <p class="text-slate-400 text-lg font-medium mt-4">No assigned errands</p>
              <p class="text-sm text-slate-400">Check available errands to accept new tasks.</p>
              <button onclick="setActiveTab('available')" class="mt-4 bg-primary text-white px-6 py-2 rounded-full text-sm font-medium">
                View Available Errands
              </button>
            </div>`;
          }

          let cards = "";
          assignedErrands.forEach((e) => {
            const badgeColor =
              e.status === "pending"
                ? "bg-amber-100 text-amber-700"
                : "bg-blue-100 text-blue-700";
            const badgeText =
              e.status === "pending" ? "Pending" : "In Progress";

            cards += `
              <div class="bg-white rounded-xl p-5 border border-slate-100 shadow-sm card-hover" data-id="${e.id}">
                <div class="flex justify-between items-start">
                  <h3 class="font-bold text-lg">${e.title}</h3>
                  <span class="text-xs px-3 py-1 rounded-full font-semibold ${badgeColor}">${badgeText}</span>
                </div>
                <p class="text-sm text-slate-500 mt-1">👤 ${e.customer} · ⏱️ ${e.time}</p>
                <div class="flex text-sm text-slate-600 mt-2">
                  <span class="material-symbols-outlined text-base mr-1">place</span>
                  ${e.pickup} → ${e.delivery}
                </div>
                <div class="flex justify-between items-center mt-3">
                  <span class="font-bold text-primary">₦${e.cost.toLocaleString()}</span>
                  <button class="view-details-agent text-sm bg-slate-100 hover:bg-primary hover:text-white px-5 py-2 rounded-lg font-medium transition-colors" data-id="${e.id}">
                    View Details
                  </button>
                </div>
              </div>
            `;
          });

          return `<div class="space-y-4"><h2 class="text-xl font-bold text-secondary">My Assigned Errands (${assignedErrands.length})</h2>${cards}</div>`;
        }

        function attachAssignedEvents() {
          document.querySelectorAll(".view-details-agent").forEach((btn) => {
            btn.addEventListener("click", (e) => {
              const id = btn.getAttribute("data-id");
              const errand = assignedErrands.find((e) => e.id === id);
              if (!errand) return;

              let actionButtons = "";
              if (errand.status === "pending") {
                actionButtons = `<button id="modalStartBtn" class="w-full bg-primary hover:bg-emerald-600 text-white py-3 rounded-xl font-bold">🚀 Start Errand</button>`;
              } else if (errand.status === "in-progress") {
                actionButtons = `
                  <button id="modalCompleteBtn" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white py-3 rounded-xl font-bold mt-2">✅ Mark as Completed</button>
                `;
              }

              modalContent.innerHTML = `
                <div>
                  <p class="font-semibold text-lg">${errand.title}</p>
                  <div class="bg-slate-50 p-4 rounded-xl space-y-2 mt-2">
                    <p><span class="font-medium">Customer:</span> ${errand.customer}</p>
                    <p><span class="font-medium">Pickup:</span> ${errand.pickup}</p>
                    <p><span class="font-medium">Delivery:</span> ${errand.delivery}</p>
                    <p><span class="font-medium">Time:</span> ${errand.time}</p>
                    <p><span class="font-medium">Description:</span> ${errand.description}</p>
                    <p><span class="font-medium">Earnings:</span> <span class="text-primary font-bold">₦${errand.cost.toLocaleString()}</span></p>
                    <p><span class="font-medium">Status:</span> <span class="${errand.status === "pending" ? "text-amber-600" : "text-blue-600"}">${errand.status === "pending" ? "Pending" : "In Progress"}</span></p>
                  </div>
                  <div class="flex flex-col gap-2 mt-4">${actionButtons}</div>
                </div>
              `;

              actionModal.classList.remove("hidden");
              actionModal.classList.add("flex");

              // Attach dynamic actions
              if (errand.status === "pending") {
                document
                  .getElementById("modalStartBtn")
                  ?.addEventListener("click", () => {
                    errand.status = "in-progress";
                    closeActionModal();
                    setActiveTab("assigned");
                  });
              } else if (errand.status === "in-progress") {
                document
                  .getElementById("modalCompleteBtn")
                  ?.addEventListener("click", () => {
                    // Move to completed
                    const index = assignedErrands.findIndex((x) => x.id === id);
                    if (index !== -1) {
                      const completed = {
                        id: errand.id,
                        title: errand.title,
                        customer: errand.customer,
                        dateCompleted: new Date().toISOString().slice(0, 10),
                        earned: errand.cost,
                      };
                      completedErrands.push(completed);
                      assignedErrands.splice(index, 1);
                      closeActionModal();
                      setActiveTab("assigned");
                    }
                  });
              }
            });
          });
        }

        // ---------- PAGE 3: COMPLETED ERRANDS ----------
        function renderCompleted() {
          const totalEarned = completedErrands.reduce(
            (sum, e) => sum + e.earned,
            0,
          );
          if (completedErrands.length === 0) {
            return `<div class="h-[70vh] flex flex-col items-center justify-center">
              <span class="material-symbols-outlined text-6xl text-slate-300">check_circle</span>
              <p class="text-slate-400">No completed errands yet.</p>
            </div>`;
          }
          let cards = "";
          completedErrands.forEach((e) => {
            cards += `
              <div class="bg-white/70 rounded-xl p-5 border border-slate-100 shadow-sm opacity-80">
                <div class="flex justify-between">
                  <h3 class="font-bold text-slate-700">${e.title}</h3>
                  <span class="bg-emerald-100 text-emerald-700 text-xs px-3 py-1 rounded-full">Completed</span>
                </div>
                <p class="text-sm text-slate-500 mt-1">👤 ${e.customer} · ✅ ${e.dateCompleted}</p>
                <p class="font-medium text-primary mt-2">+₦${e.earned}</p>
              </div>
            `;
          });
          return `
            <div class="space-y-4">
              <div class="flex justify-between items-center">
                <h2 class="text-xl font-bold">Completed errands</h2>
                <div class="bg-white px-4 py-2 rounded-full shadow-sm text-primary font-bold">
                  Total: ₦${totalEarned.toLocaleString()}
                </div>
              </div>
              ${cards}
            </div>
          `;
        }

        // ---------- PAGE 4: EARNINGS / STATS ----------
        function renderEarnings() {
          const { totalEarned, pending, completedCount } = computeEarnings();
          return `
            <div class="space-y-6">
              <h2 class="text-xl font-bold text-secondary">Earnings & stats</h2>
              <!-- metric cards -->
              <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                <div class="bg-white p-4 rounded-xl shadow-sm">
                  <span class="text-slate-500 text-xs">Total earned</span>
                  <p class="text-2xl font-bold text-primary">₦${totalEarned.toLocaleString()}</p>
                </div>
                <div class="bg-white p-4 rounded-xl shadow-sm">
                  <span class="text-slate-500 text-xs">Pending</span>
                  <p class="text-2xl font-bold text-amber-500">₦${pending.toLocaleString()}</p>
                </div>
                <div class="bg-white p-4 rounded-xl shadow-sm">
                  <span class="text-slate-500 text-xs">Completed</span>
                  <p class="text-2xl font-bold">${completedCount}</p>
                </div>
                <div class="bg-white p-4 rounded-xl shadow-sm">
                  <span class="text-slate-500 text-xs">Avg/errand</span>
                  <p class="text-2xl font-bold">₦${completedCount ? Math.round(totalEarned / completedCount) : 0}</p>
                </div>
              </div>
              <!-- filters (UI only) -->
              <div class="flex gap-2">
                <button class="bg-primary text-white px-5 py-2 rounded-full text-sm font-semibold">This week</button>
                <button class="bg-white border border-slate-200 px-5 py-2 rounded-full text-sm font-medium">Month</button>
                <button class="bg-white border border-slate-200 px-5 py-2 rounded-full text-sm font-medium">All time</button>
              </div>
              <!-- mini chart simulation -->
              <div class="bg-white p-5 rounded-xl shadow-sm">
                <p class="font-medium mb-3">Weekly earnings (mock)</p>
                <div class="space-y-3">
                  <div>
                    <div class="flex justify-between text-xs">
                      <span>Mon</span><span>₦4,200</span>
                    </div>
                    <div class="stat-bar mt-1"><div class="stat-bar-fill" style="width:75%"></div></div>
                  </div>
                  <div>
                    <div class="flex justify-between text-xs">
                      <span>Tue</span><span>₦3,500</span>
                    </div>
                    <div class="stat-bar mt-1"><div class="stat-bar-fill" style="width:60%"></div></div>
                  </div>
                  <div>
                    <div class="flex justify-between text-xs">
                      <span>Wed</span><span>₦5,800</span>
                    </div>
                    <div class="stat-bar mt-1"><div class="stat-bar-fill" style="width:100%"></div></div>
                  </div>
                  <div>
                    <div class="flex justify-between text-xs">
                      <span>Thu</span><span>₦2,900</span>
                    </div>
                    <div class="stat-bar mt-1"><div class="stat-bar-fill" style="width:50%"></div></div>
                  </div>
                </div>
              </div>
            </div>
          `;
        }

        // ---------- PAGE 5: PROFILE (agent) ----------
        function renderProfile() {
          return `
            <div class="max-w-2xl mx-auto space-y-6">
              <div class="bg-white rounded-2xl p-6 shadow-sm">
                <div class="flex flex-col items-center">
                  <div class="w-24 h-24 rounded-full bg-primary/10 flex items-center justify-center text-primary text-5xl mb-3">
                    <span class="material-symbols-outlined text-5xl">support_agent</span>
                  </div>
                  <h2 class="text-2xl font-bold">${CURRENT_AGENT_NAME}</h2>
                  <p class="text-slate-500">Agent since 2025 · ⭐ 4.9</p>
                </div>
                <div class="mt-6 space-y-4">
                  <div>
                    <label class="text-sm text-slate-500">Full name</label>
                    <input type="text" value="${CURRENT_AGENT_NAME}" class="w-full rounded-xl border-slate-200 bg-slate-50 p-3">
                  </div>
                  <div>
                    <label class="text-sm text-slate-500">Email</label>
                    <input type="email" value="chidi@errand.ng" class="w-full rounded-xl border-slate-200 bg-slate-50 p-3">
                  </div>
                  <div>
                    <label class="text-sm text-slate-500">Phone</label>
                    <input type="tel" value="+234 803 456 7890" class="w-full rounded-xl border-slate-200 bg-slate-50 p-3">
                  </div>
                </div>
              </div>
              <div class="bg-white rounded-2xl p-6 shadow-sm">
                <h3 class="font-bold mb-3">Account info</h3>
                <p class="text-sm text-slate-600">ID verified · BVN linked</p>
                <h3 class="font-bold mt-5 mb-2">Bank details (UI only)</h3>
                <p class="text-sm bg-slate-50 p-3 rounded-xl">🏦 Access Bank · 0011223344</p>
                <p class="text-sm bg-slate-50 p-3 rounded-xl mt-2">📌 Account name: Chidi Okonkwo</p>
                <button class="mt-6 w-full border border-red-200 text-red-500 hover:bg-red-50 py-3 rounded-xl font-bold transition-colors">
                  Log out (UI only)
                </button>
              </div>
            </div>
          `;
        }

        // close modal
        window.closeActionModal = function () {
          actionModal.classList.add("hidden");
          actionModal.classList.remove("flex");
        };

        // attach nav listeners
        bottomNavItems.forEach((item) =>
          item.addEventListener("click", (e) =>
            handleNavClick(e, item.getAttribute("data-tab")),
          ),
        );
        sidebarLinks.forEach((link) =>
          link.addEventListener("click", (e) =>
            handleNavClick(e, link.getAttribute("data-tab")),
          ),
        );

        // Simulate real-time updates (every 30 seconds, new errands could appear)
        // In a real app, this would be WebSocket or polling
        setInterval(() => {
          // Only refresh if on available tab
          if (currentTab === "available") {
            renderPage("available");
          }
        }, 30000);

        // initial render and counts
        updateSidebarCounts();
        setActiveTab("available");
      })();
    </script>
    <!-- bottom padding for mobile -->
    <div class="h-16 md:h-0"></div>
  </body>
</html>
